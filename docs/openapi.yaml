        - AUTH_TOKEN_REFRESHED
        - AUTH_TOKEN_REFRESH_FAILED
        - AUTH_SESSION_REVOKED
        - AUTH_PROFILE_UPDATED
        - AUTH_PASSWORD_CHANGED
        - LEAD_CREATED
        - LEAD_UPDATED
        - LEAD_STATUS_CHANGED
        - LEAD_ASSIGNED
        - LEAD_REASSIGNED
        - LEAD_UNASSIGNED
        - ACTIVITY_LOGGED
        - USER_CREATED
