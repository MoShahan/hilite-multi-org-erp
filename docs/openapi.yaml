          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Platform]
      summary: Update organization modules
      description: Enables or disables organization modules. Requires `platform:orgs:write`.
      operationId: updateOrganizationModules
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgModulesRequest"
      responses:
        "200":
          description: Modules updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/OrgModulesResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/platform/audit:
    get:
      tags: [Platform]
      summary: List platform audit logs
      description: |
        Returns a paginated cross-tenant audit trail. Requires `platform:audit:read`.
        Supports filtering by `organizationId` to scope to a single tenant.
      operationId: listPlatformAuditLogs
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - name: organizationId
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            $ref: "#/components/schemas/AuditAction"
        - name: actorId
          in: query
          schema:
            type: string
            format: uuid
        - name: entityType
          in: query
          schema:
            $ref: "#/components/schemas/AuditEntityType"
        - name: entityId
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated platform audit logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedAuditLogsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    accessTokenCookie:
      type: apiKey
      in: cookie
      name: access_token
      description: Short-lived JWT (`sub`, `orgId`) set by `POST /api/v1/auth/login` or `POST /api/v1/auth/refresh`
    refreshTokenCookie:
      type: apiKey
      in: cookie
      name: refresh_token
      description: Long-lived refresh token used only by `POST /api/v1/auth/refresh`

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    search:
      name: search
      in: query
      description: Free-text search filter
      schema:
        type: string
    sortOrder:
      name: sortOrder
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Email and password are required
            data:
              code: BAD_REQUEST
              details: []
    Unauthorized:
      description: Missing or invalid session
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Unauthorized
            data:
              code: UNAUTHORIZED
    Forbidden:
      description: Insufficient permissions or module disabled
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Forbidden
            data:
              code: FORBIDDEN
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
          example:
            success: false
            message: Not found
            data:
              code: NOT_FOUND

  schemas:
    ApiSuccessEnvelope:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [true]
        message:
          type: string
        data: {}

    ApiErrorResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
        data:
          type: object
          nullable: true
          properties:
            code:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

    PaginationMeta:
      type: object
      required: [page, pageSize, total, totalPages]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    UpdateProfileRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        phoneNumber:
          type: string
          nullable: true

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          description: Must meet password strength requirements

    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE]

    UserStatusFilter:
      type: string
      enum: [ACTIVE, INACTIVE, ALL]
      default: ALL

    OrganizationStatus:
      type: string
      enum: [ACTIVE, SUSPENDED]

    OrganizationStatusFilter:
      type: string
      enum: [ACTIVE, SUSPENDED, ALL]
      default: ALL

    LeadStatus:
      type: string
      enum:
        - NEW
        - CONTACTED
        - NEGOTIATION
        - WON
        - LOST
        - SITE_VISIT_COMPLETED
        - VISIT_SCHEDULED

    LeadStatusFilter:
      type: string
      enum:
        - NEW
        - CONTACTED
        - NEGOTIATION
        - WON
        - LOST
        - SITE_VISIT_COMPLETED
        - VISIT_SCHEDULED
        - ALL
      default: ALL

    ActivityType:
      type: string
      enum:
        - CALL
        - EMAIL
        - OFFLINE_MEETING
        - NOTE
        - ONLINE_MEETING
        - SITE_VISIT
        - MESSAGE

    NotificationType:
      type: string
      enum:
