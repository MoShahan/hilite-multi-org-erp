openapi: 3.0.3
info:
  title: HiLite ERP API
  version: 1.0.0
  license:
    name: ISC
  description: |
    REST API for **HiLite Sales OS** — a multi-tenant Sales ERP platform with organization isolation,
    role-based access control (RBAC), module toggles, platform admin management, and event-driven notifications.

    ## Base URL

    All versioned routes are prefixed with `/api/v1`.

    ## Authentication

    The API uses **HTTP-only cookie sessions** (not Bearer tokens):

    | Cookie | Purpose |
    |--------|---------|
    | `access_token` | Short-lived JWT (`sub` = user ID, `orgId` = active organization or null for platform admins) |
    | `refresh_token` | Long-lived token for `POST /api/v1/auth/refresh` |

    1. Call `POST /api/v1/auth/login` with email and password — cookies are set automatically.
    2. Send cookies on subsequent requests (browser or client with cookie jar).
    3. Call `POST /api/v1/auth/refresh` when the access token expires.
    4. Call `POST /api/v1/auth/logout` to revoke the session.

    ## Response envelope

    Successful JSON responses are wrapped by the API middleware:

    ```json
    { "success": true, "message": "", "data": { ... } }
    ```

    Errors return:

    ```json
    { "success": false, "message": "Human-readable message", "data": { "code": "ERROR_CODE", "details": [] } }
    ```

    ## Multi-tenancy

    Organization users never pass a tenant ID in URLs — the active tenant is encoded in the JWT
    `orgId` claim and resolved via `organization_members` on each request.
    Platform administrators (no org membership) use `orgId: null` and access cross-tenant APIs under `/api/v1/platform/*`.

    See [Architecture — Multi-Org Readiness](architecture.md#multi-org-readiness) for the membership model.

    ## Org modules

    Some routes require an organization module to be enabled:

    | Module key | Routes |
    |------------|--------|
    | `sales_erp` | `/api/v1/leads/*` |
    | `dashboards` | `/api/v1/dashboard/*` |
    | `notifications` | `/api/v1/notifications/*` |

    Platform admins toggle modules per org via `PATCH /api/v1/platform/organizations/{id}/modules`.

    ## Permissions

    Protected routes enforce granular permissions (e.g. `leads:read`, `users:write`).
    Missing permission returns **403 Forbidden**. Missing or invalid session returns **401 Unauthorized**.

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Session management and profile
  - name: Permissions
    description: Permission catalog for role management UI
  - name: Users
    description: Organization user management
  - name: Teams
    description: Team and team member management
  - name: Roles
    description: Role and permission grant management
  - name: Leads
    description: CRM pipeline (requires `sales_erp` module)
  - name: Dashboard
    description: Analytics and customizable layout (requires `dashboards` module)
  - name: Notifications
    description: In-app alerts (org users require `notifications` module; platform users always have access)
  - name: Audit
    description: Organization audit trail
  - name: Platform
    description: Cross-tenant platform administration

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates with email and password. On success, sets `access_token` and `refresh_token`
        HTTP-only cookies. Returns a confirmation message in the response body.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: admin@hilitebuilders.com
              password: HBuilders@123
      responses:
        "200":
          description: Login successful; session cookies set
          headers:
            Set-Cookie:
              description: "Sets access_token and refresh_token HTTP-only cookies"
              schema:
                type: string
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh session
      description: |
        Rotates the refresh token and issues a new access token. Requires the `refresh_token` cookie.
        On success, both cookies are updated.
      operationId: refreshSession
      security:
        - refreshTokenCookie: []
      responses:
        "200":
          description: Token refreshed; session cookies updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Revokes the refresh token, clears session cookies, and logs an audit event. Does not require a valid access token.
      operationId: logout
      security: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Returns the authenticated user's profile, organization context, enabled modules, role, and permissions.
      operationId: getMe
      security:
        - accessTokenCookie: []
      responses:
        "200":
          description: Current auth context
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthMeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Auth]
      summary: Update profile
      description: Updates the authenticated user's name and optional phone number.
      operationId: updateMe
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthMeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      description: Changes the authenticated user's password after verifying the current password.
      operationId: changePassword
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/permissions:
    get:
      tags: [Permissions]
      summary: List permissions
      description: |
        Returns the permission catalog for role management UI.
        Requires `roles:read` or `roles:read:team`.
      operationId: listPermissions
      security:
        - accessTokenCookie: []
      responses:
        "200":
          description: Permission catalog
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ListPermissionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users/options:
    get:
      tags: [Users]
      summary: List user options
      description: |
        Returns a lightweight list of users for dropdowns and pickers.
        Use `for=lead-assignment` with `teamId` for assignee pickers (`leads:write`).
        Use `for=filter` for user filter dropdowns (`users:read` or `users:read:team`).
      operationId: listUserOptions
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/search"
        - name: for
          in: query
          required: true
          schema:
            type: string
            enum: [lead-assignment, filter]
        - name: teamId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserOptionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      description: |
        Returns a paginated list of organization users.
        Requires `users:read` or `users:read:team`.
      operationId: listUsers
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/search"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/UserStatusFilter"
        - name: roleId
          in: query
          schema:
            type: string
            format: uuid
        - name: membershipScope
          in: query
          schema:
            $ref: "#/components/schemas/RoleMembershipScope"
        - name: teamId
          in: query
          schema:
            type: string
            format: uuid
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, email, status, role, team, createdAt]
            default: createdAt
        - $ref: "#/components/parameters/sortOrder"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedUsersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Users]
      summary: Create user
      description: Creates a new organization user. Requires `users:write`.
      operationId: createUser
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user]
                        properties:
                          user:
                            $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/users/{id}/status:
    patch:
      tags: [Users]
      summary: Update user status
      description: Activates or deactivates a user. Requires `users:write`.
      operationId: updateUserStatus
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusRequest"
      responses:
        "200":
          description: User status updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [user]
                        properties:
                          user:
                            $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/teams/options:
    get:
      tags: [Teams]
      summary: List team options
      description: Returns a lightweight list of teams for dropdowns. Requires `teams:read`.
      operationId: listTeamOptions
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/search"
      responses:
        "200":
          description: Team options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TeamOptionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/teams:
    get:
      tags: [Teams]
      summary: List teams
      description: Returns a paginated list of teams. Requires `teams:read`.
      operationId: listTeams
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/search"
        - name: membership
          in: query
          schema:
            type: string
            enum: [ALL, WITH_MEMBERS, EMPTY]
            default: ALL
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, memberCount, createdAt]
            default: createdAt
        - $ref: "#/components/parameters/sortOrder"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated team list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedTeamsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Teams]
      summary: Create team
      description: Creates a new team. Requires `teams:write`.
      operationId: createTeam
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TeamDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/teams/{id}:
    get:
      tags: [Teams]
      summary: Get team
      description: Returns team details. Requires `teams:read`.
      operationId: getTeam
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: Team details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TeamDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/teams/{id}/members:
    get:
      tags: [Teams]
      summary: List team members
      description: Returns a paginated list of team members. Requires `teams:read` or `users:read:team`.
      operationId: listTeamMembers
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
        - $ref: "#/components/parameters/search"
        - name: roleId
          in: query
          schema:
            type: string
            format: uuid
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, email, role, createdAt]
            default: createdAt
        - $ref: "#/components/parameters/sortOrder"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated team members
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedTeamMembersResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Teams]
      summary: Add team member
      description: Creates a user and adds them to the team. Requires `teams:write` or `users:write:team`.
      operationId: createTeamMember
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamMemberRequest"
      responses:
        "201":
          description: Team member created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          member:
                            $ref: "#/components/schemas/TeamMember"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/roles/options:
    get:
      tags: [Roles]
      summary: List role options
      description: Returns a lightweight list of roles for dropdowns. Requires `roles:read` or `roles:read:team`.
      operationId: listRoleOptions
      security:
        - accessTokenCookie: []
      parameters:
        - name: membershipScope
          in: query
          schema:
            $ref: "#/components/schemas/RoleMembershipScope"
        - name: assignableFrom
          in: query
          schema:
            type: string
            enum: [users, team]
      responses:
        "200":
          description: Role options
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RoleOptionsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/roles:
    get:
      tags: [Roles]
      summary: List roles
      description: Returns all roles in the organization. Requires `roles:read` or `roles:read:team`.
      operationId: listRoles
      security:
        - accessTokenCookie: []
      parameters:
        - name: membershipScope
          in: query
          schema:
            $ref: "#/components/schemas/RoleMembershipScope"
        - name: assignableFrom
          in: query
          schema:
            type: string
            enum: [users, team]
      responses:
        "200":
          description: Role list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ListRolesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Roles]
      summary: Create role
      description: Creates a custom role with permission grants. Requires `roles:write`.
      operationId: createRole
      security:
        - accessTokenCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RoleDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/roles/{id}:
    get:
      tags: [Roles]
      summary: Get role
      description: Returns role details including permissions. Requires `roles:read` or `roles:read:team`.
      operationId: getRole
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "200":
          description: Role details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RoleDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Roles]
      summary: Update role
      description: Updates role name and/or permissions. Requires `roles:write`. Protected system roles cannot be modified.
      operationId: updateRole
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RoleDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Roles]
      summary: Delete role
      description: Deletes a custom role. Requires `roles:write`. Protected roles and roles with assigned users cannot be deleted.
      operationId: deleteRole
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/idPath"
      responses:
        "204":
          description: Role deleted (no response body)
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/leads:
    get:
      tags: [Leads]
      summary: List leads
      description: |
        Returns a paginated list of leads scoped by the caller's permissions.
        Requires `sales_erp` module and one of `leads:read`, `leads:read:team`, or `leads:read:org`.
      operationId: listLeads
      security:
        - accessTokenCookie: []
      parameters:
        - $ref: "#/components/parameters/search"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/LeadStatusFilter"
        - name: teamId
          in: query
          schema:
            type: string
            format: uuid
        - name: assignedToId
          in: query
          description: Filter by assignee user ID. Use the literal value `unassigned` for unassigned leads.
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, status, team, assignee, createdAt]
            default: createdAt
        - $ref: "#/components/parameters/sortOrder"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Paginated lead list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/PaginatedLeadsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
